<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Background — full bleed for maskable use -->
  <rect width="192" height="192" fill="#10b981"/>
  <!-- Inner rounded card gives depth on non-maskable contexts -->
  <rect x="16" y="16" width="160" height="160" rx="28" fill="#059669"/>
  <!-- Document shape -->
  <rect x="52" y="44" width="68" height="84" rx="6" fill="white" opacity="0.15"/>
  <rect x="58" y="44" width="62" height="8" rx="4" fill="white" opacity="0.3"/>
  <!-- DF lettering -->
  <text
    x="96"
    y="108"
    font-family="system-ui, -apple-system, sans-serif"
    font-size="54"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    dominant-baseline="central"
    letter-spacing="-2"
  >DF</text>
  <!-- Small tagline dots -->
  <circle cx="72" cy="140" r="4" fill="white" opacity="0.5"/>
  <circle cx="84" cy="140" r="4" fill="white" opacity="0.5"/>
  <circle cx="96" cy="140" r="4" fill="white" opacity="0.5"/>
  <circle cx="108" cy="140" r="4" fill="white" opacity="0.5"/>
  <circle cx="120" cy="140" r="4" fill="white" opacity="0.5"/>
</svg>
